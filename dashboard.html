<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Sykes Trading Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0e1a;
      color: #e0e6f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #0f1729 0%, #1a2444 100%);
      border-bottom: 2px solid #2a3f6f;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(90deg, #00d4ff, #7b61ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-left p {
      font-size: 0.75rem;
      color: #6b7fa3;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff4444;
      animation: none;
    }

    .status-dot.active {
      background: #00ff88;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    .status-text {
      font-size: 0.85rem;
      font-weight: 600;
    }

    .clock {
      font-size: 0.85rem;
      color: #6b7fa3;
      font-family: monospace;
    }

    /* CONTROLS */
    .controls {
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: #0d1220;
      border-bottom: 1px solid #1e2d4a;
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-start {
      background: linear-gradient(135deg, #00c853, #00e676);
      color: #000;
    }

    .btn-start:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
    }

    .btn-stop {
      background: linear-gradient(135deg, #ff1744, #ff5252);
      color: #fff;
    }

    .btn-stop:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
    }

    .btn-clear {
      background: linear-gradient(135deg, #ff6d00, #ff9100);
      color: #000;
    }

    .btn-clear:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(255, 109, 0, 0.4);
    }

    .btn-refresh {
      background: linear-gradient(135deg, #2979ff, #448aff);
      color: #fff;
    }

    .stats-bar {
      margin-left: auto;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-val {
      font-size: 1.2rem;
      font-weight: 700;
      color: #00d4ff;
    }

    .stat-label {
      font-size: 0.65rem;
      color: #6b7fa3;
      text-transform: uppercase;
    }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 0;
      height: calc(100vh - 130px);
    }

    /* SCANNER RESULTS */
    .results-panel {
      overflow-y: auto;
      padding: 20px;
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-title {
      font-size: 1rem;
      font-weight: 600;
      color: #a0b0d0;
    }

    .last-scan {
      font-size: 0.75rem;
      color: #4a5a7a;
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #3a4a6a;
    }

    .no-results .icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    /* SETUP CARD */
    .setup-card {
      background: #0f1729;
      border: 1px solid #1e2d4a;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .setup-card:hover {
      border-color: #2a4a8a;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .setup-card.grade-aplus {
      border-left: 4px solid #00ff88;
      background: linear-gradient(135deg, #0f1729, #0a1f12);
    }

    .setup-card.grade-a {
      border-left: 4px solid #00d4ff;
      background: linear-gradient(135deg, #0f1729, #0a1825);
    }

    .setup-card.grade-b {
      border-left: 4px solid #ffd600;
      background: linear-gradient(135deg, #0f1729, #1a1800);
    }

    .setup-card.grade-d {
      border-left: 4px solid #ff1744;
      background: linear-gradient(135deg, #0f1729, #1f0a0a);
      opacity: 0.6;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .ticker-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .ticker {
      font-size: 1.3rem;
      font-weight: 800;
      color: #fff;
    }

    .grade-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .grade-badge.aplus { background: #00ff88; color: #000; }
    .grade-badge.a     { background: #00d4ff; color: #000; }
    .grade-badge.b     { background: #ffd600; color: #000; }
    .grade-badge.d     { background: #ff1744; color: #fff; }

    .gap-pct {
      font-size: 1.1rem;
      font-weight: 700;
      color: #00ff88;
    }

    .card-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      background: #0a0e1a;
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }

    .metric-val {
      font-size: 0.95rem;
      font-weight: 700;
      color: #e0e6f0;
    }

    .metric-label {
      font-size: 0.6rem;
      color: #4a5a7a;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .catalyst {
      font-size: 0.78rem;
      padding: 6px 10px;
      background: #0a0e1a;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .trade-plan {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .trade-item {
      background: #0a0e1a;
      border-radius: 6px;
      padding: 6px;
      text-align: center;
    }

    .trade-val {
      font-size: 0.85rem;
      font-weight: 700;
    }

    .trade-label {
      font-size: 0.55rem;
      color: #4a5a7a;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .entry-val  { color: #00d4ff; }
    .stop-val   { color: #ff4444; }
    .target-val { color: #00ff88; }

    .skip-banner {
      background: rgba(255, 23, 68, 0.15);
      border: 1px solid #ff1744;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #ff5252;
      margin-top: 8px;
      text-align: center;
    }

    .headlines {
      margin-top: 8px;
    }

    .headline {
      font-size: 0.72rem;
      color: #4a6a9a;
      padding: 3px 0;
      border-top: 1px solid #1e2d4a;
    }

    /* SIDEBAR */
    .sidebar {
      background: #0d1220;
      border-left: 1px solid #1e2d4a;
      overflow-y: auto;
      padding: 16px;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7fa3;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .alert-item {
      padding: 8px 10px;
      background: #0f1729;
      border-radius: 6px;
      margin-bottom: 6px;
      border-left: 3px solid #2a3f6f;
    }

    .alert-time {
      font-size: 0.65rem;
      color: #4a5a7a;
      font-family: monospace;
    }

    .alert-msg {
      font-size: 0.78rem;
      color: #a0b0d0;
      margin-top: 2px;
    }

    /* SCANNING ANIMATION */
    .scanning-bar {
      height: 3px;
      background: linear-gradient(90deg, #00d4ff, #7b61ff, #00d4ff);
      background-size: 200%;
      animation: scan 2s linear infinite;
    }

    @keyframes scan {
      0% { background-position: 0%; }
      100% { background-position: 200%; }
    }

    .scanning-bar.hidden { display: none; }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0e1a; }
    ::-webkit-scrollbar-thumb { background: #2a3f6f; border-radius: 4px; }

    /* MOBILE */
    @media (max-width: 768px) {
      .main {
        grid-template-columns: 1fr;
        height: auto;
      }
      .sidebar { border-left: none; border-top: 1px solid #1e2d4a; }
      .stats-bar { display: none; }
      .trade-plan { grid-template-columns: repeat(2, 1fr); }
      .card-metrics { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- SCANNING BAR -->
<div class="scanning-bar hidden" id="scanBar"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1>🔥 Sykes Trading Agent</h1>
    <p>Small Cap Scanner — Sykes Method</p>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Offline</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <button class="btn btn-start" onclick="startScanner()">▶ Start Scanner</button>
  <button class="btn btn-stop" onclick="stopScanner()">⏹ Stop Scanner</button>
  <button class="btn btn-clear" onclick="clearAlerts()">🗑 Clear Alerts</button>
  <button class="btn btn-refresh" onclick="loadResults()">🔄 Refresh</button>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-val" id="statSetups">0</div>
      <div class="stat-label">Setups</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statAplus">0</div>
      <div class="stat-label">A+ Grade</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statAlerts">0</div>
      <div class="stat-label">Alerts</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statTime">--:--</div>
      <div class="stat-label">Last Scan</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- RESULTS -->
  <div class="results-panel">
    <div class="results-header">
      <span class="results-title">📊 Scanner Results</span>
      <span class="last-scan" id="lastScan">Waiting for scan...</span>
    </div>
    <div id="results">
      <div class="no-results">
        <div class="icon">🔍</div>
        <p>Press Start Scanner to begin</p>
        <p style="font-size:0.8rem;margin-top:8px;color:#3a4a6a">
          Scans every 10 seconds for Sykes setups
        </p>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-title">📋 Activity Log</div>
    <div id="alertLog">
      <div class="alert-item">
        <div class="alert-time">--:--:--</div>
        <div class="alert-msg">Waiting to connect...</div>
      </div>
    </div>
  </div>

</div>

<script>
  // ============================================================
  // WEBSOCKET CONNECTION
  // ============================================================

  const WS_URL  = `ws://${location.host}/ws`;
  const API_URL = `${location.protocol}//${location.host}`;

  let ws         = null;
  let isRunning  = false;
  let lastData   = null;

  function connectWS() {
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      console.log('WebSocket connected');
      updateStatus(isRunning);
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.type === 'status') {
        isRunning = msg.running;
        updateStatus(isRunning);
      }

      if (msg.type === 'scan_results') {
        lastData = msg;
        renderResults(msg.data);
        renderAlerts(msg.alerts);
        updateStats(msg);
      }
    };

    ws.onclose = () => {
      console.log('WebSocket disconnected, retrying...');
      setTimeout(connectWS, 3000);
    };

    ws.onerror = () => ws.close();
  }

  // ============================================================
  // RENDER RESULTS
  // ============================================================

  function renderResults(data) {
    const container = document.getElementById('results');

    if (!data || data.length === 0) {
      container.innerHTML = `
        <div class="no-results">
          <div class="icon">📭</div>
          <p>No qualifying setups found</p>
          <p style="font-size:0.8rem;margin-top:8px;color:#3a4a6a">
            Scanner is running — next scan soon
          </p>
        </div>`;
      return;
    }

    container.innerHTML = data.map(s => {
      const gradeClass = {
        'A+': 'aplus', 'A': 'a', 'B': 'b', 'D': 'd'
      }[s.grade] || 'b';

      const cardClass = {
        'A+': 'grade-aplus', 'A': 'grade-a',
        'B':  'grade-b',     'D': 'grade-d'
      }[s.grade] || 'grade-b';

      const headlines = (s.headlines || []).map(h =>
        `<div class="headline">📰 ${h.substring(0, 80)}...</div>`
      ).join('');

      const notes = (s.notes || []).map(n =>
        `<span style="font-size:0.72rem;color:#6b8ab0">📌 ${n}</span>`
      ).join(' ');

      const skipBanner = s.warning
        ? `<div class="skip-banner">⛔ SKIP — Dangerous catalyst detected!</div>`
        : '';

      const strongSetup = ['A+', 'A'].includes(s.grade) && !s.warning
        ? `<div style="font-size:0.72rem;color:#00ff88;margin-top:6px">
             ✅ STRONG SETUP — Watch for continuation!
           </div>`
        : '';

      return `
        <div class="setup-card ${cardClass}">
          <div class="card-header">
            <div class="ticker-info">
              <span class="ticker">${s.ticker}</span>
              <span class="grade-badge ${gradeClass}">${s.grade}</span>
            </div>
            <span class="gap-pct">+${s.gap_pct}%</span>
          </div>

          <div class="card-metrics">
            <div class="metric">
              <div class="metric-val">$${s.price}</div>
              <div class="metric-label">Price Now</div>
            </div>
            <div class="metric">
              <div class="metric-val">$${s.prev_close}</div>
              <div class="metric-label">Prev Close</div>
            </div>
            <div class="metric">
              <div class="metric-val">$${(s.dollar_vol/1000).toFixed(0)}K</div>
              <div class="metric-label">$ Volume</div>
            </div>
          </div>

          <div class="catalyst">${s.catalyst}</div>

          <div class="trade-plan">
            <div class="trade-item">
              <div class="trade-val entry-val">
                $${s.entry_low}–$${s.entry_high}
              </div>
              <div class="trade-label">Entry</div>
            </div>
            <div class="trade-item">
              <div class="trade-val stop-val">$${s.stop_loss}</div>
              <div class="trade-label">Stop -5%</div>
            </div>
            <div class="trade-item">
              <div class="trade-val target-val">$${s.target1}</div>
              <div class="trade-label">T1 +10%</div>
            </div>
            <div class="trade-item">
              <div class="trade-val target-val">$${s.target2}</div>
              <div class="trade-label">T2 +20%</div>
            </div>
          </div>

          <div style="margin-top:8px">${notes}</div>
          ${headlines}
          ${skipBanner}
          ${strongSetup}

          <div style="font-size:0.65rem;color:#3a4a6a;
                      margin-top:8px;text-align:right">
            ${s.time}
          </div>
        </div>`;
    }).join('');
  }

  // ============================================================
  // RENDER ALERTS
  // ============================================================

  function renderAlerts(alerts) {
    const container = document.getElementById('alertLog');
    if (!alerts || alerts.length === 0) return;

    container.innerHTML = alerts.map(a => `
      <div class="alert-item">
        <div class="alert-time">${a.time}</div>
        <div class="alert-msg">${a.message}</div>
      </div>`
    ).join('');
  }

  // ============================================================
  // UPDATE STATS
  // ============================================================

  function updateStats(msg) {
    const data   = msg.data || [];
    const alerts = msg.alerts || [];

    document.getElementById('statSetups').textContent = data.length;
    document.getElementById('statAplus').textContent  =
      data.filter(s => s.grade === 'A+').length;
    document.getElementById('statAlerts').textContent = alerts.length;
    document.getElementById('statTime').textContent   = msg.time || '--:--';
    document.getElementById('lastScan').textContent   =
      `Last scan: ${msg.time} — ${data.length} setup(s)`;
  }

  // ============================================================
  // UPDATE STATUS
  // ============================================================

  function updateStatus(running) {
    const dot  = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const bar  = document.getElementById('scanBar');

    if (running) {
      dot.classList.add('active');
      text.textContent = 'Scanner Active';
      text.style.color = '#00ff88';
      bar.classList.remove('hidden');
    } else {
      dot.classList.remove('active');
      text.textContent = 'Scanner Stopped';
      text.style.color = '#ff4444';
      bar.classList.add('hidden');
    }
  }

  // ============================================================
  // BUTTONS
  // ============================================================

  async function startScanner() {
    try {
      await fetch(`${API_URL}/api/scanner/start`, { method: 'POST' });
      isRunning = true;
      updateStatus(true);
    } catch(e) {
      alert('Could not connect to server. Is it running?');
    }
  }

  async function stopScanner() {
    try {
      await fetch(`${API_URL}/api/scanner/stop`, { method: 'POST' });
      isRunning = false;
      updateStatus(false);
    } catch(e) {
      alert('Could not connect to server.');
    }
  }

  async function clearAlerts() {
    try {
      await fetch(`${API_URL}/api/clear-alerts`, { method: 'POST' });
    } catch(e) {}
  }

  async function loadResults() {
    try {
      const r    = await fetch(`${API_URL}/api/results`);
      const data = await r.json();
      renderResults(data.data);
      renderAlerts(data.alerts);
    } catch(e) {}
  }

  // ============================================================
  // CLOCK
  // ============================================================

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.toLocaleTimeString('en-US', {
        hour12: true,
        timeZone: 'America/New_York'
      }) + ' EST';
  }

  setInterval(updateClock, 1000);
  updateClock();

  // ============================================================
  // INIT
  // ============================================================

  connectWS();
  loadResults();
</script>
</body>
</html>
